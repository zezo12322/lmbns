version: '3.8'
services:
  db:
    image: postgres:15
    container_name: lmbns-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lmbns
    ports:
      - "5432:5432"
    volumes:
      - lmbns-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  lmbns-pgdata:
